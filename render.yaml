services:
  - type: web
    name: argentos
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: ARGENT_STATE_DIR
        value: /data/.argentos
      - key: ARGENT_WORKSPACE_DIR
        value: /data/workspace
      - key: ARGENT_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: argentos-data
      mountPath: /data
      sizeGB: 1
