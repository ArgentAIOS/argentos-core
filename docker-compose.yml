services:
  argentos-gateway:
    image: ${ARGENT_IMAGE:-argentos:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ARGENT_GATEWAY_TOKEN: ${ARGENT_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ARGENT_CONFIG_DIR}:/home/node/.argentos
      - ${ARGENT_WORKSPACE_DIR}:/home/node/.argentos/workspace
    ports:
      - "${ARGENT_GATEWAY_PORT:-18789}:18789"
      - "${ARGENT_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${ARGENT_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  argentos-cli:
    image: ${ARGENT_IMAGE:-argentos:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ARGENT_GATEWAY_TOKEN: ${ARGENT_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ARGENT_CONFIG_DIR}:/home/node/.argentos
      - ${ARGENT_WORKSPACE_DIR}:/home/node/.argentos/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
